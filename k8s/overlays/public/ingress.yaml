apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-ingress
spec:
  ingressClassName: traefik
  rules:
    # Konsumenten-Sicht: nur die Demo-Seite ist von außen erreichbar.
    # admin (web-ui-i18n) und swagger laufen zwar im Pod, sind aber nicht
    # im Ingress eingetragen und damit cluster-intern only.
    - host: web-ui.public.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 3000
