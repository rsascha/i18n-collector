apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod-ingress
spec:
  ingressClassName: traefik
  rules:
    # Konsumenten-Sicht: nur die Demo-Seite ist von außen erreichbar.
    # admin (web-ui-i18n) ist in `prod` gar nicht deployed — keine Admin-UI in
    # der Konsumenten-Umgebung. Swagger ebenfalls nicht im Ingress.
    - host: web-ui.prod.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 3000
