apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: web-ui.dev.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 3000

    - host: admin.dev.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui-i18n
                port:
                  number: 3001

    # Spring-API ist nur über die Doku-Pfade (Swagger UI + OpenAPI-JSON)
    # erreichbar. Translations-CRUD läuft cluster-intern über api:8080,
    # erreichbar nur von web-ui und web-ui-i18n.
    - host: api.dev.localtest.me
      http:
        paths:
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
