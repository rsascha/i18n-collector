apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - namespace.yaml
  - ../../base
  - web-ui-i18n.yaml   # nur im dev-Namespace — kein Admin-Use-Case in public
  - ingress.yaml

# `dev`-DB nutzt anderen Default-Passwort als `public`, damit man bei
# kreuz-konfiguriertem port-forward den Unterschied früh bemerkt.
#
# Außerdem: dev/api bekommt PUBLIC_API_BASE_URL gesetzt, damit der
# /translations/promote-Endpoint die public-API cluster-intern erreichen kann.
patches:
  - target:
      kind: Secret
      name: postgres-secret
    patch: |-
      - op: replace
        path: /stringData/POSTGRES_PASSWORD
        value: translations-dev
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PUBLIC_API_BASE_URL
          value: http://api.public.svc.cluster.local:8080

labels:
  - pairs:
      app.kubernetes.io/environment: dev
