apiVersion: v1
kind: Service
metadata:
  name: web-ui-i18n
  labels:
    app: web-ui-i18n
spec:
  type: ClusterIP
  selector:
    app: web-ui-i18n
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-i18n
  labels:
    app: web-ui-i18n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-ui-i18n
  template:
    metadata:
      labels:
        app: web-ui-i18n
    spec:
      containers:
        - name: web-ui-i18n
          image: web-ui-i18n:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: API_BASE_URL
              value: http://api:8080
          # TCP-Probe statt HTTP — die Server-Component auf / fetcht die API,
          # was die Pod-Liveness sonst an den API-Pod koppelt. UI-readiness
          # heißt „Port offen, Node-Prozess lebt", nicht „Backend antwortet".
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
