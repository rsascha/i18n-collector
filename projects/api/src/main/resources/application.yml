# Variablen werden aus der Umgebung gelesen. Für lokale Entwicklung:
# Kopiere .env.example zu .env und source es vor dem App-Start
# (z. B. `set -a && source .env && set +a && ./mvnw spring-boot:run`)
# oder hinterlege die Variablen im IDE-Run-Config.

spring:
  application:
    name: api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:translations}
    username: ${DB_USERNAME:translations}
    password: ${DB_PASSWORD:translations}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  ai:
    bedrock:
      aws:
        region: ${AWS_REGION:eu-central-1}
      converse:
        chat:
          model: ${BEDROCK_MODEL_ID:eu.anthropic.claude-haiku-4-5-20251001-v1:0}

app:
  i18n:
    # MUSS synchron zu projects/web-ui/src/i18n/i18n.ts (supportedLngs)
    # gehalten werden — beim Erweitern der Sprachen beide Stellen anpassen.
    source-lng: en
    supported-lngs:
      - en
      - de
  sync:
    # Ziel-API für den Promote-Flow. In `dev` per Env-Var auf den
    # public-Namespace-Service gesetzt (`http://api.public.svc.cluster.local:8080`),
    # in `public` selbst leer → /translations/promote ist dort nicht nutzbar.
    public-api-base-url: ${PUBLIC_API_BASE_URL:}

logging:
  level:
    de.actyvyst.api: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true